name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for npm version"
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck, lint, test)
        run: npm run check

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          case "$BUMP" in
            patch|minor|major) ;;
            *) echo "::error::Invalid bump '$BUMP'"; exit 1 ;;
          esac
          NEW_TAG="$(npm version "$BUMP" -m "chore(release): %s")"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        env:
          BRANCH: ${{ github.ref_name }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          git push origin "HEAD:$BRANCH"
          git push origin "refs/tags/$TAG"

      - name: Build
        run: npm run build

      - name: Assemble release package
        id: package
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          set -euo pipefail
          PKG="waverider-$TAG"
          mkdir -p "staging/$PKG/app"
          cp -r dist/. "staging/$PKG/app/"
          cp packaging/README.txt "staging/$PKG/README.txt"
          cp packaging/start-windows.bat "staging/$PKG/start-windows.bat"
          cp packaging/start-macos-linux.sh "staging/$PKG/start-macos-linux.sh"
          chmod +x "staging/$PKG/start-macos-linux.sh"
          (cd staging && zip -r "../$PKG.zip" "$PKG")
          echo "zip=$PKG.zip" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: WaveRider ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
