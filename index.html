<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>WaveRider</title>
    <meta name="description" content="WaveRider — surf any song as a beat-synced retrowave track. Drop in a file and ride the wave." />
    <style>
      /* #06010c fallback visible before the inline SVG paints (should be instant) */
      html  { margin: 0; padding: 0; background: #06010c; }
      body  { margin: 0; padding: 0; }
      /* Banner sits at z-index 0 in the root stacking context */
      #banner-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #banner-bg svg {
        width: 100%;
        height: 100%;
      }
      /* App stacking context sits above the banner; transparent content lets it show through */
      #app {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <!-- Retrowave banner shown immediately during JS load; covered by #app once Vue mounts. -->
    <div id="banner-bg">
      <svg viewBox="0 0 1200 380" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="banner-sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0"   stop-color="#11052a"/>
            <stop offset="0.5" stop-color="#2a0a4e"/>
            <stop offset="0.8" stop-color="#7c1450"/>
            <stop offset="1"   stop-color="#06010c"/>
          </linearGradient>
          <linearGradient id="banner-sun" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0"    stop-color="#fef08a"/>
            <stop offset="0.42" stop-color="#fb923c"/>
            <stop offset="0.72" stop-color="#ff2d78"/>
            <stop offset="1"    stop-color="#b01a86"/>
          </linearGradient>
          <linearGradient id="banner-title" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#bdefff"/>
          </linearGradient>
          <radialGradient id="banner-halo" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#ff2d78" stop-opacity="0.6"/>
            <stop offset="1" stop-color="#ff2d78" stop-opacity="0"/>
          </radialGradient>
          <filter id="banner-glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="banner-softglow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <mask id="banner-sunmask">
            <rect x="0" y="0"   width="1200" height="380" fill="black"/>
            <rect x="0" y="30"  width="1200" height="100" fill="white"/>
            <rect x="0" y="130" width="1200" height="12"  fill="white"/>
            <rect x="0" y="148" width="1200" height="11"  fill="white"/>
            <rect x="0" y="167" width="1200" height="9"   fill="white"/>
            <rect x="0" y="187" width="1200" height="7"   fill="white"/>
            <rect x="0" y="208" width="1200" height="5"   fill="white"/>
          </mask>
        </defs>

        <!-- Sky -->
        <rect x="0" y="0" width="1200" height="380" fill="url(#banner-sky)"/>

        <!-- Stars -->
        <g fill="#ffffff" opacity="0.7">
          <circle cx="120"  cy="50"  r="1.3"/><circle cx="240"  cy="92"  r="1"/><circle cx="360" cy="40"  r="1.2"/>
          <circle cx="980"  cy="60"  r="1.3"/><circle cx="1080" cy="100" r="1"/><circle cx="860" cy="44"  r="1.1"/>
          <circle cx="60"   cy="120" r="1"/>  <circle cx="1140" cy="150" r="1.1"/><circle cx="430" cy="74" r="0.9"/>
          <circle cx="760"  cy="80"  r="0.9"/>
        </g>

        <!-- Sun + halo -->
        <ellipse cx="600" cy="150" rx="220" ry="150" fill="url(#banner-halo)"/>
        <circle  cx="600" cy="130" r="96" fill="url(#banner-sun)" mask="url(#banner-sunmask)" filter="url(#banner-softglow)"/>

        <!-- Perspective grid -->
        <g stroke="#22d3ee" stroke-width="1" opacity="0.55" filter="url(#banner-softglow)">
          <line x1="600" y1="300" x2="-170" y2="380"/>
          <line x1="600" y1="300" x2="40"   y2="380"/>
          <line x1="600" y1="300" x2="210"  y2="380"/>
          <line x1="600" y1="300" x2="360"  y2="380"/>
          <line x1="600" y1="300" x2="490"  y2="380"/>
          <line x1="600" y1="300" x2="600"  y2="380"/>
          <line x1="600" y1="300" x2="710"  y2="380"/>
          <line x1="600" y1="300" x2="840"  y2="380"/>
          <line x1="600" y1="300" x2="990"  y2="380"/>
          <line x1="600" y1="300" x2="1160" y2="380"/>
          <line x1="600" y1="300" x2="1370" y2="380"/>
          <line x1="0" y1="304" x2="1200" y2="304"/>
          <line x1="0" y1="310" x2="1200" y2="310"/>
          <line x1="0" y1="319" x2="1200" y2="319"/>
          <line x1="0" y1="331" x2="1200" y2="331"/>
          <line x1="0" y1="347" x2="1200" y2="347"/>
          <line x1="0" y1="367" x2="1200" y2="367"/>
        </g>
        <!-- Horizon glow -->
        <line x1="0" y1="300" x2="1200" y2="300" stroke="#ff2d78" stroke-width="2.5" opacity="0.9" filter="url(#banner-glow)"/>

        <!-- Wordmark and tagline are rendered by the Vue app; omitted here to avoid duplication. -->
      </svg>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
