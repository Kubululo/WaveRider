<svg viewBox="0 0 1200 380" width="1200" height="380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WaveRider — Surf the Frequency">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11052a"/>
      <stop offset="0.5" stop-color="#2a0a4e"/>
      <stop offset="0.8" stop-color="#7c1450"/>
      <stop offset="1" stop-color="#06010c"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef08a"/>
      <stop offset="0.42" stop-color="#fb923c"/>
      <stop offset="0.72" stop-color="#ff2d78"/>
      <stop offset="1" stop-color="#b01a86"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bdefff"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff2d78" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ff2d78" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="sunMask">
      <rect x="0" y="0" width="1200" height="380" fill="black"/>
      <rect x="0" y="30" width="1200" height="100" fill="white"/>
      <rect x="0" y="130" width="1200" height="12" fill="white"/>
      <rect x="0" y="148" width="1200" height="11" fill="white"/>
      <rect x="0" y="167" width="1200" height="9" fill="white"/>
      <rect x="0" y="187" width="1200" height="7" fill="white"/>
      <rect x="0" y="208" width="1200" height="5" fill="white"/>
    </mask>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1200" height="380" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="120" cy="50" r="1.3"/><circle cx="240" cy="92" r="1"/><circle cx="360" cy="40" r="1.2"/>
    <circle cx="980" cy="60" r="1.3"/><circle cx="1080" cy="100" r="1"/><circle cx="860" cy="44" r="1.1"/>
    <circle cx="60" cy="120" r="1"/><circle cx="1140" cy="150" r="1.1"/><circle cx="430" cy="74" r="0.9"/>
    <circle cx="760" cy="80" r="0.9"/>
  </g>

  <!-- Sun + halo -->
  <ellipse cx="600" cy="150" rx="220" ry="150" fill="url(#halo)"/>
  <circle cx="600" cy="130" r="96" fill="url(#sun)" mask="url(#sunMask)" filter="url(#softglow)"/>

  <!-- Perspective grid -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.55" filter="url(#softglow)">
    <line x1="600" y1="300" x2="-170" y2="380"/>
    <line x1="600" y1="300" x2="40"   y2="380"/>
    <line x1="600" y1="300" x2="210"  y2="380"/>
    <line x1="600" y1="300" x2="360"  y2="380"/>
    <line x1="600" y1="300" x2="490"  y2="380"/>
    <line x1="600" y1="300" x2="600"  y2="380"/>
    <line x1="600" y1="300" x2="710"  y2="380"/>
    <line x1="600" y1="300" x2="840"  y2="380"/>
    <line x1="600" y1="300" x2="990"  y2="380"/>
    <line x1="600" y1="300" x2="1160" y2="380"/>
    <line x1="600" y1="300" x2="1370" y2="380"/>
    <line x1="0" y1="304" x2="1200" y2="304"/>
    <line x1="0" y1="310" x2="1200" y2="310"/>
    <line x1="0" y1="319" x2="1200" y2="319"/>
    <line x1="0" y1="331" x2="1200" y2="331"/>
    <line x1="0" y1="347" x2="1200" y2="347"/>
    <line x1="0" y1="367" x2="1200" y2="367"/>
  </g>
  <!-- Horizon glow -->
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#ff2d78" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>

  <!-- Wordmark -->
  <g font-family="'Arial Black', 'Arial', Helvetica, sans-serif" font-weight="900" font-style="italic" text-anchor="middle">
    <text x="602" y="232" font-size="92" fill="#06010c" opacity="0.55" letter-spacing="2">WAVERIDER</text>
    <text x="600" y="230" font-size="92" letter-spacing="2" filter="url(#glow)">
      <tspan fill="url(#title)">WAVE</tspan><tspan fill="#22d3ee">RIDER</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="600" y="272" text-anchor="middle" font-family="'Arial', Helvetica, sans-serif" font-weight="700"
        font-size="19" letter-spacing="9" fill="#9fe9ff" opacity="0.85">SURF THE FREQUENCY</text>
</svg>
